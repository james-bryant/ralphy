name: Native Packages

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  package-windows:
    name: Package Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build Windows app image
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Archive Windows app image
        shell: pwsh
        run: Compress-Archive -Path target/dist/windows/Ralphy -DestinationPath target/dist/windows/Ralphy-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralphy-windows
          path: target/dist/windows/Ralphy-windows.zip

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Normalize shell scripts
        run: sed -i 's/\r$//' mvnw scripts/package-linux.sh

      - name: Make launch scripts executable
        run: chmod +x mvnw scripts/package-linux.sh

      - name: Build Linux app image
        run: xvfb-run -a ./scripts/package-linux.sh

      - name: Archive Linux app image
        run: tar -C target/dist/linux -czf target/dist/linux/Ralphy-linux.tar.gz Ralphy

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ralphy-linux
          path: target/dist/linux/Ralphy-linux.tar.gz
